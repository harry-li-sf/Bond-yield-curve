name: update-18-chinabond-yield-curves-and-deploy

on:
  schedule:
    # Beijing time 18:13, 19:37, 20:23, 21:47, 22:19 on weekdays.
    - cron: '13 10 * * 1-5'
    - cron: '37 11 * * 1-5'
    - cron: '23 12 * * 1-5'
    - cron: '47 13 * * 1-5'
    - cron: '19 14 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set timezone
        run: sudo timedatectl set-timezone Asia/Shanghai

      - name: Determine data update mode
        id: data_mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_data_update=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled/manual run: data update enabled"
          else
            echo "run_data_update=false" >> "$GITHUB_OUTPUT"
            echo "Push run: deploy only, data update skipped"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Generate derived files from existing data
        if: steps.data_mode.outputs.run_data_update != 'true'
        run: python ci_update.py --derived-only

      - name: Fetch latest yield curve data
        if: steps.data_mode.outputs.run_data_update == 'true'
        run: python ci_update.py

      - name: Validate data files
        if: steps.data_mode.outputs.run_data_update == 'true'
        run: |
          for f in data.json data_cdb.json data_gov_ytm.json data_cdb_ytm.json data_*.json life_discount.json preset_model_data.js summary.json; do
            if [ -f "$f" ]; then
              SIZE=$(wc -c < "$f")
              echo "$f size: $SIZE bytes"
              if [ "$SIZE" -lt 100 ] && [ "$f" != "summary.json" ]; then
                echo "Invalid data file: $f is smaller than 100 bytes"
                exit 1
              fi
            fi
          done

      - name: Commit and push data updates
        if: steps.data_mode.outputs.run_data_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data_cdb.json data_gov_ytm.json data_cdb_ytm.json data_*.json life_discount.json preset_model_data.js summary.json 2>/dev/null || git add data.json || echo "No data files to add"

          if git diff --cached --quiet; then
            echo "No data changes. Checking whether keepalive commit is needed..."
            LAST_COMMIT_TS=$(git log -1 --format="%ct")
            NOW_TS=$(date +%s)
            DIFF_HOURS=$(( (NOW_TS - LAST_COMMIT_TS) / 3600 ))
            echo "Hours since last commit: ${DIFF_HOURS}"
            if [ "$DIFF_HOURS" -gt 23 ]; then
              echo "Creating keepalive commit..."
              git commit --allow-empty -m "keepalive: $(date +'%Y-%m-%d %H:%M')"
              git pull --rebase origin main
              git push
              echo "Keepalive pushed"
            else
              echo "No keepalive needed"
            fi
          else
            echo "Data changed. Creating data update commit..."
            git commit -m "auto update data: $(date +'%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push
            echo "Data update pushed"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
